<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0A0F1E;
  --primary:#3B82F6;--primary-h:#2563EB;--primary-l:#EFF6FF;
  --accent:#06B6D4;--accent-l:#ECFEFF;
  --violet:#8B5CF6;--violet-l:#F5F3FF;
  --t0:#FFFFFF;--t1:#FBFCFD;--t2:#F4F6F8;--t3:#E5E9EF;--t4:#CBD3DE;
  --t5:#94A3B8;--t6:#64748B;--t7:#334155;--t8:#1E293B;--t9:#0F172A;
  --success:#10B981;--success-l:#ECFDF5;
  --warning:#F59E0B;--warning-l:#FFFBEB;
  --danger:#EF4444;--danger-l:#FEF2F2;
  --hb:var(--primary);--hbm:var(--primary-h);--hbl:var(--primary-l);
  --hc:var(--accent);--hcl:var(--accent-l);--hv:var(--violet);--hvl:var(--violet-l);
  --hg:var(--t1);--hbr:var(--t3);--ht:var(--t8);--hmu:var(--t6);
  --hs:var(--success);--hsl:var(--success-l);--hd:var(--danger);--hw:var(--warning);--hwl:var(--warning-l);
  --bg:var(--t0);--bg2:var(--t1);
  --grad-deep:linear-gradient(135deg,#0A0F1E 0%,#1E293B 100%);
  --grad-ia:linear-gradient(135deg,#06B6D4 0%,#8B5CF6 100%);
  --sh-1:0 1px 2px rgba(15,23,42,.04);
  --sh-2:0 4px 8px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
}
html[data-theme="dark"]{
  --t0:#0F172A;--t1:#0A1224;--t2:#111B33;--t3:#1E293B;--t4:#334155;
  --t5:#64748B;--t6:#94A3B8;--t7:#CBD5E1;--t8:#E2E8F0;--t9:#F8FAFC;
  --primary-l:#172554;--accent-l:#083344;--violet-l:#2E1065;
  --success-l:#022C22;--warning-l:#451A03;--danger-l:#450A0A;
  --bg:#0A1224;--bg2:#0F172A;
}
html,body{height:100%}
body{font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;color:var(--t8);font-size:13px;background:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
.app{border:0.5px solid var(--hbr);border-radius:12px;overflow:hidden;background:var(--bg);margin:14px;min-height:calc(100vh - 28px);display:flex;flex-direction:column}
.app-body{display:flex;flex:1;min-height:0;overflow:hidden}

.hdr{display:flex;align-items:center;justify-content:space-between;background:var(--t0);color:var(--t8);padding:12px 22px;border-bottom:1px solid var(--t3);min-height:58px}
html[data-theme="dark"] .hdr{background:var(--t1)}
.hdr-logo{width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-name{font-size:14.5px;font-weight:700;letter-spacing:-.3px;color:var(--t9)}
.hdr-sub{font-size:11px;color:var(--t6);margin-top:1px;font-weight:500}
.hdr-back{background:var(--t2);border:1px solid var(--t3);color:var(--t7);padding:7px 14px;border-radius:8px;font-size:12.5px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600;transition:all .12s}
.hdr-back:hover{background:var(--t3);color:var(--t9)}
.theme-toggle{background:var(--t2);border:1px solid var(--t3);color:var(--t7);width:34px;height:34px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .12s;margin-right:8px}
.theme-toggle:hover{background:var(--t3);color:var(--t9)}

.sidebar{width:256px;background:var(--t1);border-right:1px solid var(--t3);overflow-y:auto;padding:14px 0;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:var(--t4);border-radius:3px}
.side-sec{padding:14px 18px 6px;font-size:10.5px;color:var(--t5);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-top:4px}
.side-sec:first-child{margin-top:0;padding-top:6px}
.side-item{display:flex;align-items:center;gap:11px;padding:8px 18px;margin:0 8px;color:var(--t7);font-size:13px;cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;border-radius:7px;font-family:inherit;font-weight:500;transition:all .12s}
.side-item:hover{background:var(--t2);color:var(--t9)}
.side-item.active{background:var(--primary-l);color:var(--primary-h);font-weight:600}
html[data-theme="dark"] .side-item.active{background:rgba(59,130,246,.18);color:#93C5FD}
.side-item .ico{width:18px;height:18px;flex-shrink:0;stroke-width:2}

.content{flex:1;overflow-y:auto;background:var(--t0);padding:24px 28px}
.page-title{font-size:22px;color:var(--t9);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px;letter-spacing:-.5px}
.page-sub{font-size:13px;color:var(--t6);margin-bottom:22px;max-width:780px;line-height:1.65}

.card{background:var(--t0);border:1px solid var(--t3);border-radius:14px;padding:20px 22px;margin-bottom:16px;box-shadow:var(--sh-1);transition:box-shadow .12s}
.card:hover{box-shadow:var(--sh-2)}
.card h3{font-size:15px;color:var(--t9);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--t3);letter-spacing:-.2px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.field label{font-size:11.5px;font-weight:600;color:var(--t7);letter-spacing:.05px}
.field input,.field select{padding:9px 12px;border:1px solid var(--t3);border-radius:8px;font-size:13px;background:var(--t0);color:var(--t8);outline:none;font-family:inherit;font-weight:500;transition:all .12s}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}

.btn{border:1px solid transparent;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--sh-1)}.bp:hover{background:var(--primary-h);box-shadow:var(--sh-2)}
.bc{background:var(--accent);color:#fff;border-color:var(--accent)}.bc:hover{background:#0891B2}
.bg{background:var(--t0);border:1px solid var(--t3);color:var(--t7)}.bg:hover{background:var(--t2);color:var(--t9)}

.result-box{background:linear-gradient(135deg,#e8f0fb,#d6f1fc);border:0.5px solid #b5cae8;border-radius:8px;padding:14px 16px;margin-top:10px}
.result-box.warn{background:linear-gradient(135deg,#fff3e0,#fce0a8);border-color:#e8c285}
.result-box.danger{background:linear-gradient(135deg,#fdecea,#f4c8c4);border-color:#e6a39e}
.result-box.ok{background:linear-gradient(135deg,#e6f5ed,#c3e8d4);border-color:#a4cdb6}
.r-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:0.5px dashed rgba(11,61,145,.15)}
.r-row:last-child{border-bottom:none}
.r-row b{color:var(--hb);font-family:monospace;font-size:13px}
.r-big{font-size:22px;font-weight:600;color:var(--hb);text-align:center;margin:7px 0;font-family:monospace}
.r-label{font-size:10px;color:var(--hmu);text-align:center;text-transform:uppercase;letter-spacing:.5px}

.info{background:var(--hbl);border-left:3px solid var(--hbm);padding:9px 12px;font-size:11px;color:var(--hb);border-radius:5px;margin:10px 0;line-height:1.55}
.info b{color:var(--hb)}
.tip{background:var(--hwl);border-left:3px solid var(--hw);padding:9px 12px;font-size:11px;color:#7c4400;border-radius:5px;margin:10px 0;line-height:1.55}

table.lk{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
table.lk th{background:var(--bg2);padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:var(--hmu);border-bottom:0.5px solid var(--hbr);font-weight:600;letter-spacing:.4px}
table.lk td{padding:5px 8px;border-bottom:0.5px solid var(--hbr);font-family:monospace}
table.lk tr:hover{background:var(--hbl)}

.chk-list{display:flex;flex-direction:column;gap:5px}
.chk-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--hbr);cursor:pointer;font-size:11.5px;line-height:1.45;transition:all .15s}
.chk-row:hover{background:var(--hbl)}
.chk-row.done{background:var(--hsl);border-left-color:var(--hs);opacity:.7}
.chk-row.done .chk-txt{text-decoration:line-through;color:var(--hmu)}
.chk-row.na{background:var(--bg2);border-left-color:var(--hmu);opacity:.5}
.chk-cb{margin-top:2px;flex-shrink:0;width:14px;height:14px;cursor:pointer}
.chk-txt{flex:1}
.chk-cat{font-size:9px;text-transform:uppercase;color:var(--hmu);font-weight:600;letter-spacing:.4px}

.tabs{display:flex;gap:1px;background:var(--bg2);border-radius:7px;padding:3px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:7px 10px;font-size:11px;color:var(--hmu);border-radius:5px;cursor:pointer;font-weight:500;background:none;border:none;font-family:inherit}
.tab.active{background:var(--hb);color:#fff}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--ht);color:#fff;padding:9px 14px;border-radius:6px;font-size:11.5px;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:tin .2s ease-out;max-width:340px}
.toast.ok{background:var(--hs)}.toast.err{background:var(--hd)}.toast.warn{background:var(--hw)}
@keyframes tin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:500;letter-spacing:.3px}
.b-sim{background:var(--hsl);color:#0f5c33}
.b-nao{background:#fdecea;color:#7a1c12}
.b-pen{background:#fff3e0;color:#7c4400}
.b-info{background:var(--hbl);color:var(--hb)}

.kpi{background:var(--bg2);border:0.5px solid var(--hbr);border-radius:8px;padding:10px;text-align:center}
.kpi-val{font-size:18px;font-weight:600;color:var(--hb);font-family:monospace}
.kpi-lbl{font-size:9.5px;color:var(--hmu);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

.help{font-size:10.5px;color:var(--hmu);margin-top:4px;font-style:italic}

.mono{font-family:monospace}
</style>

function calcHI(){

  if(!V||!A||!vel){toast('Preencha V, A e velocidade','warn');return;}
  const HI_J=(60*V*A*eta)/vel; // J/mm
  const HI_kJ=HI_J/1000;
  document.getElementById('hi-val').textContent=fmt(HI_kJ,2)+' kJ/mm';
  document.getElementById('hi-j').textContent=fmt(HI_J,0)+' J/mm';
  document.getElementById('hi-p').textContent=fmt(V*A,0)+' W';
  document.getElementById('hi-vs').textContent=fmt(vel/60,2)+' mm/s';
  let cls,col,rec;
  if(HI_kJ<0.5){cls='Muito baixo';col='warn';rec='⚠️ Aporte muito baixo pode gerar falta de fusão. Verifique a velocidade.';}
  else if(HI_kJ<1.5){cls='Faixa normal';col='ok';rec='✔ Faixa adequada para a maioria dos processos de tubulação industrial.';}
  else if(HI_kJ<3.0){cls='Alto';col='warn';rec='⚠️ Aporte alto. Pode gerar zona termicamente afetada (ZTA) larga e perda de tenacidade. Confirme com PQR.';}

  document.getElementById('hi-cls').textContent=cls;
  const box=document.getElementById('hi-out');box.className='result-box '+col;
  const recBox=document.getElementById('hi-rec');recBox.style.display='block';recBox.textContent=rec;
}

function presetMat(m){
  const presets={
    a106b:{c:0.30,mn:1.06,cr:0.40,mo:0.15,v:0.08,ni:0.40,cu:0.40},
    a335p11:{c:0.15,mn:0.50,cr:1.25,mo:0.50,v:0,ni:0,cu:0},
    a335p22:{c:0.15,mn:0.45,cr:2.25,mo:1.00,v:0,ni:0,cu:0}
  };
  const p=presets[m];if(!p)return;
  Object.keys(p).forEach(k=>document.getElementById('pa-'+k).value=p[k]);
  calcCE();
}
function calcCE(){
  const C=n('pa-c'),Mn=n('pa-mn'),Cr=n('pa-cr'),Mo=n('pa-mo'),V=n('pa-v'),Ni=n('pa-ni'),Cu=n('pa-cu');
  const t=n('pa-t'),H=parseFloat(document.getElementById('pa-h').value);
  const CE=carbonoEquiv(C,Mn,Cr,Mo,V,Ni,Cu);
  const Pcm=C + Mn/20 + (Cu+Cr)/20 + Ni/60 + Mo/15 + V/10; // simplificado sem Si/B
  let Tp;
  if(CE<0.30)Tp=0;
  else if(CE<0.40)Tp=Math.max(0,50+t*1.0+(H-10)*2);
  else if(CE<0.50)Tp=Math.max(100,80+t*1.5+(H-10)*3);
  else Tp=Math.max(150,120+t*2+(H-10)*4);
  // limite alto típico ~250°C
  if(Tp>300)Tp=300;
  let sold='Excelente',col='ok';
  if(CE>=0.30)sold='Boa';
  if(CE>=0.40){sold='Cuidado';col='warn';}
  if(CE>=0.55){sold='Difícil — soldagem qualificada e PWHT';col='danger';}
  let inter=300;
  if(CE>=0.40)inter=260;
  if(CE>=0.50)inter=230;
  document.getElementById('pa-temp').textContent=Tp>0?Math.round(Tp)+' °C':'Não exigido';
  document.getElementById('pa-ce').textContent=fmt(CE,3);
  document.getElementById('pa-pcm').textContent=fmt(Pcm,3);
  document.getElementById('pa-sold').textContent=sold;
  document.getElementById('pa-inter').textContent=inter+' °C';
  document.getElementById('pa-out').className='result-box '+col;
  const r=document.getElementById('pa-rec');r.style.display='block';
  if(CE<0.30)r.innerHTML='✔ <b>Soldabilidade excelente.</b> Pré-aquecimento normalmente dispensado. Verifique apenas a presença de umidade.';
  else if(CE<0.45)r.innerHTML='⚠️ <b>Pré-aquecer a '+Math.round(Tp)+' °C.</b> Use lápis indicador (Tempilstik) ou pirômetro. Manter interpasse até '+inter+' °C.';
  else r.innerHTML='⛔ <b>Material com risco de trinca a frio.</b> Pré-aquecimento obrigatório a '+Math.round(Tp)+' °C. Considere PWHT (alívio de tensões pós-soldagem).';
}

function atualizaArea(){
  const t=n('co-t'),g=n('co-gap'),r=n('co-ref'),lr=n('co-lar');
  const chf=document.getElementById('co-chf').value;
  let area;
  if(chf==='60')area=t*t*Math.tan(30*Math.PI/180)+t*g+r*lr*0.5;
  else if(chf==='70')area=t*t*Math.tan(35*Math.PI/180)+t*g+r*lr*0.5;
  else if(chf==='x')area=t*t*0.5*Math.tan(30*Math.PI/180)+t*g+r*lr;
  else if(chf==='u')area=t*g+Math.PI*Math.pow(t/2,2)*0.6+r*lr*0.5;
  else area=t*t*0.5; // filete
  document.getElementById('co-area').textContent=fmt(area,1)+' mm²';
}
function calcConsumo(){
  atualizaArea();
  const area=parseFloat(document.getElementById('co-area').textContent);
  const L=n('co-l'),rend=parseFloat(document.getElementById('co-rend').value),dens=n('co-dens');
  const vol_cm3=area*L*1000/1000; // mm²·m → mm²·1000mm → mm³, /1000 → cm³
  const massa_g=vol_cm3*dens;
  const compra_kg=(massa_g/1000)/rend;
  document.getElementById('co-vol').textContent=fmt(vol_cm3,1)+' cm³';
  document.getElementById('co-massa').textContent=fmt(massa_g/1000,3)+' kg';
  document.getElementById('co-compra').textContent=fmt(compra_kg,3)+' kg';
  document.getElementById('co-und').textContent=Math.ceil(compra_kg*1000/50)+' und';
}

function bvDraw(){
  const t=n('bv-t'),ang=n('bv-ang'),nose=n('bv-nose'),gap=n('bv-gap');
  const halfAng=ang/2*Math.PI/180;
  const scale=Math.min(180/t,10);
  // Ponto central do nariz
  const cx=160,cy=180;
  const tH=t*scale,gH=gap*scale,nH=nose*scale;
  const angX=(tH-nH)*Math.tan(halfAng);
  // Lado esquerdo do chanfro
  const ptsL=[[cx-gH/2,cy],[cx-gH/2,cy-nH],[cx-gH/2-angX,cy-tH],[cx-50,cy-tH],[cx-50,cy]];
  const ptsR=[[cx+gH/2,cy],[cx+gH/2,cy-nH],[cx+gH/2+angX,cy-tH],[cx+50,cy-tH],[cx+50,cy]];
  const path=(arr)=>'M '+arr.map(p=>p.join(' ')).join(' L ')+' Z';
  document.getElementById('bv-svg').innerHTML=`
    <path d="${path(ptsL)}" fill="#5a6a85" stroke="#1a2336" stroke-width="1"/>
    <path d="${path(ptsR)}" fill="#5a6a85" stroke="#1a2336" stroke-width="1"/>
    <path d="M ${cx-gH/2} ${cy-nH} L ${cx-gH/2-angX} ${cy-tH} L ${cx+gH/2+angX} ${cy-tH} L ${cx+gH/2} ${cy-nH} L ${cx+gH/2} ${cy} L ${cx-gH/2} ${cy} Z" fill="#00A8E8" opacity="0.5"/>
    <text x="${cx}" y="${cy-tH-10}" text-anchor="middle" font-size="10" fill="#0B3D91">t=${t} mm</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="9" fill="#0B3D91">gap=${gap} mm · ${ang}°</text>
    <text x="${cx+gH/2+angX+5}" y="${cy-tH/2}" font-size="9" fill="#7c4400">${ang/2}°</text>`;
  // Área
  const area=t*gap + (t-nose)*(t-nose)*Math.tan(halfAng);
  document.getElementById('bv-area').textContent=fmt(area,1)+' mm²';
  document.getElementById('bv-vol').textContent=fmt(area*1000/1000,1)+' cm³/m';
}

function renderWeldersTable(){
  const data=JSON.parse(localStorage.getItem('hyd_welders_qual')||'[]');
  const now=new Date();
  document.getElementById('w-tb').innerHTML=data.length?data.map((w,i)=>{
    const last=w.data?new Date(w.data):null;
    let venc=null,daysLeft=null,status='—',badge='b-info';
    if(last){
      venc=new Date(last);venc.setMonth(venc.getMonth()+6);
      daysLeft=Math.floor((venc-now)/86400000);
      if(daysLeft<0){status='VENCIDA há '+(-daysLeft)+' d';badge='b-nao';}
      else if(daysLeft<=15){status='Vence em '+daysLeft+' d';badge='b-pen';}
      else{status='OK ('+daysLeft+' d)';badge='b-sim';}
    }
    return `<tr>
      <td>${esc(w.mat)}</td><td>${esc(w.nome)}</td><td>${esc(w.proc)}</td><td>${esc(w.pos)}</td>
      <td>${esc(w.material||'—')}</td><td>${esc(w.dia||'—')}"</td><td>${esc(w.pqr||'—')}</td>
      <td>${w.data||'—'}</td>
      <td>${venc?venc.toLocaleDateString('pt-BR'):'—'}</td>
      <td><span class="badge ${badge}">${status}</span></td>
      <td><button class="btn bg" style="padding:3px 7px;font-size:10px" onclick="rmWelder(${i})">🗑</button></td>
    </tr>`;
  }).join(''):'<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--hmu);font-family:inherit">Nenhum soldador. Adicione acima.</td></tr>';
}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function addWelder(){
  const mat=s('w-mat'),nome=s('w-nome');
  if(!mat||!nome){toast('Matrícula e nome obrigatórios','warn');return;}
  const data=JSON.parse(localStorage.getItem('hyd_welders_qual')||'[]');
  data.push({mat,nome,proc:s('w-proc'),pos:s('w-pos'),material:s('w-mat-aco'),dia:s('w-dia'),data:s('w-data'),pqr:s('w-pqr')});
  localStorage.setItem('hyd_welders_qual',JSON.stringify(data));
  ['w-mat','w-nome','w-mat-aco','w-dia','w-data','w-pqr'].forEach(id=>document.getElementById(id).value='');
  toast('Adicionado','ok');renderWeldersTable();
}
function rmWelder(i){
  const data=JSON.parse(localStorage.getItem('hyd_welders_qual')||'[]');
  data.splice(i,1);localStorage.setItem('hyd_welders_qual',JSON.stringify(data));renderWeldersTable();
}
function exportWelders(){
  const data=localStorage.getItem('hyd_welders_qual')||'[]';
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='soldadores_qualificacao.json';a.click();
}
function importWelders(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);localStorage.setItem('hyd_welders_qual',JSON.stringify(d));toast('Importado','ok');renderWeldersTable();}catch(e){toast('JSON inválido','err');}};
  r.readAsText(f);
}

function schGo(){
  const nps=document.getElementById('sch-nps').value,sch=document.getElementById('sch-sch').value;
  const mat=document.getElementById('sch-mat').value;
  const dens=DENS[mat]||7850;
  const e=SCH_B3610[nps];if(!e)return;
  const od=e[0];const wt=e[1][sch];
  if(wt){
    const id=od-2*wt;
    const peso=Math.PI*(od-wt)*wt*dens/1e6; // kg/m
    document.getElementById('sch-od').textContent=fmt(od,1);
    document.getElementById('sch-wt').textContent=fmt(wt,2);
    document.getElementById('sch-id').textContent=fmt(id,1);
    document.getElementById('sch-pm').textContent=fmt(peso,2);
  }else{
    document.getElementById('sch-od').textContent='—';
    document.getElementById('sch-wt').textContent='N/A';
    document.getElementById('sch-id').textContent='—';
    document.getElementById('sch-pm').textContent='—';

  // Tabela completa
  const tb=document.querySelector('#sch-tbl tbody');
  tb.innerHTML=Object.keys(e[1]).map(k=>{
    const w=e[1][k];const id=od-2*w;const p=Math.PI*(od-w)*w*dens/1e6;
    return `<tr><td>${k.toUpperCase()}</td><td>${fmt(w,2)}</td><td>${fmt(id,1)}</td><td>${fmt(p,2)}</td></tr>`;
  }).join('');
}

          </div>

function calcPeso(){
  const od=n('pe-od'),wt=n('pe-wt');
  const denT=parseFloat(document.getElementById('pe-mat').value);
  const denF=parseFloat(document.getElementById('pe-flu').value);
  const L=n('pe-l');
  const idd=od-2*wt;
  const pt=Math.PI*(od-wt)*wt*denT/1e6;
  const pf=Math.PI*Math.pow(idd/2,2)*denF/1e6;
  document.getElementById('pe-pt').textContent=fmt(pt,2);
  document.getElementById('pe-pf').textContent=fmt(pf,2);
  document.getElementById('pe-pts').textContent=fmt(pt*L,1);
  document.getElementById('pe-pcs').textContent=fmt((pt+pf)*L,1);
}

function renderTH(){
  document.getElementById('content').innerHTML=`
    <div class="page-title">💧 Pressão de Teste Hidrostático</div>
    <div class="page-sub">Calcula a pressão de teste conforme <b>ASME B31.3 (par. 345.4.2)</b> e <b>NR-13 anexo II</b>. Use o resultado para emitir a planilha de TH e validar a faixa de pressão da bomba.</div>
    <div class="grid2">
      <div class="card">
        <h3>📥 Entradas</h3>
        <div class="field"><label>Norma de projeto</label>
          <select id="th-norm" onchange="calcTH()">
            <option value="b313">ASME B31.3 — Tubulação de processo</option>
            <option value="b311">ASME B31.1 — Tubulação de potência</option>
            <option value="nr13">NR-13 — Caldeiras e vasos</option>
            <option value="petrobras">normas industriais de montagem</option>
          </select>
        </div>
        <div class="grid2">
          <div class="field"><label>Pressão de projeto P (bar)</label><input id="th-p" type="number" step="0.1" value="20" oninput="calcTH()"></div>
          <div class="field"><label>Temperatura projeto (°C)</label><input id="th-t" type="number" step="1" value="150" oninput="calcTH()"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Tensão admissível @ T (St)</label><input id="th-st" type="number" step="1" value="124" oninput="calcTH()"></div>
          <div class="field"><label>Tensão admissível @ 20°C (S20)</label><input id="th-s20" type="number" step="1" value="138" oninput="calcTH()"></div>
        </div>
        <button class="btn bp" onclick="calcTH()">Calcular</button>
        <div class="tip">⚠️ Quando S20/St &gt; 6,5, limite a pressão de teste para evitar deformação plástica. Verifique também a pressão máxima das flanges (ASME B16.5).</div>
      </div>
      <div class="card">
        <h3>📤 Resultado</h3>
        <div class="result-box ok">
          <div class="r-label">Pressão de teste hidrostático</div>
          <div class="r-big" id="th-pt">—</div>
          <div class="r-row"><span>Multiplicador da norma</span><b id="th-mult">—</b></div>
          <div class="r-row"><span>Fator térmico (S20/St)</span><b id="th-ft">—</b></div>
          <div class="r-row"><span>Pressão equivalente psi</span><b id="th-psi">—</b></div>
          <div class="r-row"><span>Duração mínima</span><b id="th-dur">—</b></div>
        </div>
        <div class="info"><b>Procedimento:</b> Pressurizar a 50% da pressão de teste; inspecionar; subir aos 100% e manter por no mínimo 10 min sem queda. Liberar com perda de no máximo 0,5%/h.</div>
      </div>
    </div>`;
  calcTH();
}
function calcTH(){
  const norm=document.getElementById('th-norm').value;
  const P=n('th-p'),T=n('th-t'),St=n('th-st'),S20=n('th-s20');
  let mult,dur;
  if(norm==='b313'){mult=1.5;dur='10 min';}
  else if(norm==='b311'){mult=1.5;dur='10 min';}
  else if(norm==='nr13'){mult=1.5;dur='15 min';}
  else {mult=1.5;dur='30 min';}
  let ft=St>0?S20/St:1;if(ft>6.5)ft=6.5;
  let Pt=P*mult*ft;
  document.getElementById('th-mult').textContent=mult+'·P';
  document.getElementById('th-ft').textContent=fmt(ft,3);
  document.getElementById('th-pt').textContent=fmt(Pt,2)+' bar';
  document.getElementById('th-psi').textContent=fmt(Pt*14.5038,1)+' psi';
  document.getElementById('th-dur').textContent=dur;
}

          </select>
        </div>
        <div class="field"><label>Classe do parafuso</label>
          <select id="tq-cl">
            <option value="724">A193 B7 (σy = 724 MPa)</option>
            <option value="930">A193 B16</option>
            <option value="965">A540 Gr.B23</option>
            <option value="240">Aço comum 8.8</option>
          </select>
        </div>
        <div class="field"><label>K (coef. atrito)</label>
          <select id="tq-k">
            <option value="0.20">0,20 — Seco</option>
            <option value="0.16" selected>0,16 — Lubrificado óleo</option>
            <option value="0.14">0,14 — Pasta de Mo (Molykote)</option>
            <option value="0.12">0,12 — Anti-engripante</option>
          </select>
        </div>
        <div class="field"><label>% da tensão de escoamento</label><input id="tq-pct" type="number" step="5" value="50"></div>
        <button class="btn bp" onclick="calcTQ()">Calcular</button>
      </div>
      <div class="card">
        <h3>📤 Torque recomendado</h3>
        <div class="result-box ok">
          <div class="r-big" id="tq-val">—</div>
          <div class="r-row"><span>Tração de aperto (F)</span><b id="tq-f">—</b></div>
          <div class="r-row"><span>Área de tração</span><b id="tq-at">—</b></div>
          <div class="r-row"><span>Conversão lb·ft</span><b id="tq-lb">—</b></div>
        </div>
        <div class="info">Para aperto cruzado: aplicar 30% → 60% → 100% do torque, sempre cruzado (norma ASME PCC-1). Recalibrar torquímetro a cada 6 meses.</div>
      </div>
    </div>`;
  calcTQ();
}
const BOLTS={'M16':[16,156],'M20':[20,245],'M24':[24,353],'M30':[30,561],'M36':[36,817],'3/4':[19.05,215],'7/8':[22.23,298],'1':[25.4,391],'1.1/4':[31.75,624]};
function calcTQ(){
  const b=document.getElementById('tq-bolt').value;
  const cl=parseFloat(document.getElementById('tq-cl').value);
  const K=parseFloat(document.getElementById('tq-k').value);
  const pct=n('tq-pct')/100;
  const [d,At]=BOLTS[b];
  const F=cl*At*pct; // N
  const Tnm=K*d/1000*F; // Nm
  document.getElementById('tq-val').textContent=fmt(Tnm,0)+' N·m';
  document.getElementById('tq-f').textContent=fmt(F/1000,2)+' kN';
  document.getElementById('tq-at').textContent=At+' mm²';
  document.getElementById('tq-lb').textContent=fmt(Tnm*0.7376,0)+' lb·ft';
}

let _curvaData=[];
function calcCurva(){
  const HH=n('cs-hh'),W=n('cs-w'),k=parseFloat(document.getElementById('cs-p').value);
  _curvaData=[];let acum=0;
  // Função beta normalizada — produz curva S
  for(let i=1;i<=W;i++){
    const x=i/W;const f=Math.pow(x,2*k)/(Math.pow(x,2*k)+Math.pow(1-x,2*k));
    const prev=i===1?0:Math.pow((i-1)/W,2*k)/(Math.pow((i-1)/W,2*k)+Math.pow(1-(i-1)/W,2*k));
    const sem=Math.round((f-prev)*HH);
    acum+=sem;
    _curvaData.push({sem:i,hh:sem,acum,pct:f*100});
  }
  // Desenha
  const cv=document.getElementById('cs-cv'),ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#0B3D91';ctx.lineWidth=2;ctx.beginPath();
  const pad=30,W2=cv.width-pad*2,H=cv.height-pad*2;
  _curvaData.forEach((d,i)=>{const x=pad+(d.sem/W)*W2,y=cv.height-pad-(d.pct/100)*H;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
  ctx.stroke();
  // Eixos
  ctx.strokeStyle='#d0d8e8';ctx.lineWidth=1;
  for(let i=0;i<=10;i++){const y=cv.height-pad-(i/10)*H;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(cv.width-pad,y);ctx.stroke();}
  ctx.fillStyle='#5a6a85';ctx.font='10px monospace';
  for(let i=0;i<=10;i++){const y=cv.height-pad-(i/10)*H;ctx.fillText((i*10)+'%',5,y+3);}
  for(let i=0;i<=W;i+=Math.max(1,Math.round(W/8))){const x=pad+(i/W)*W2;ctx.fillText('S'+i,x-6,cv.height-10);}
  // tabela
  document.querySelector('#cs-tb tbody').innerHTML=_curvaData.map(d=>`<tr><td>S${d.sem}</td><td>${fmt(d.hh,0)}</td><td>${fmt(d.acum,0)}</td><td>${fmt(d.pct,1)}%</td></tr>`).join('');
}
function exportCurva(){
  if(!_curvaData.length){toast('Gere a curva primeiro','warn');return;}
  const csv='Semana;HH Semanal;HH Acumulado;% Acumulado\n'+_curvaData.map(d=>`S${d.sem};${d.hh};${d.acum};${d.pct.toFixed(1)}%`).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='curva_s.csv';a.click();
}

  return `<div class="grid2">
    <div class="field"><label>De</label>
      <input id="cv-${cat}-v" type="number" step="0.0001" value="${val}" oninput="conv('${cat}')">
      <select id="cv-${cat}-fu" onchange="conv('${cat}')">${units.map(u=>`<option ${u===from?'selected':''}>${u}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Para</label>
      <input id="cv-${cat}-r" readonly style="background:var(--hbl)">
      <select id="cv-${cat}-tu" onchange="conv('${cat}')">${units.map(u=>`<option ${u===to?'selected':''}>${u}</option>`).join('')}</select>
    </div>
  </div>`;
}
function conv(cat){
  const v=n('cv-'+cat+'-v');
  const fu=document.getElementById('cv-'+cat+'-fu').value;
  const tu=document.getElementById('cv-'+cat+'-tu').value;
  const fb=CONV[cat][fu]*v;
  const r=fb/CONV[cat][tu];
  document.getElementById('cv-'+cat+'-r').value=r.toLocaleString('pt-BR',{maximumFractionDigits:6});
}
function convTemp(src){
  let c;
  if(src==='c'){c=n('cv-c');}
  else if(src==='f'){c=(n('cv-f')-32)*5/9;}
  else{c=n('cv-k')-273.15;}
  if(src!=='c')document.getElementById('cv-c').value=c.toFixed(2);
  if(src!=='f')document.getElementById('cv-f').value=(c*9/5+32).toFixed(2);
  if(src!=='k')document.getElementById('cv-k').value=(c+273.15).toFixed(2);
}

// Inicializa conversores
function initAllConv(){['comprimento','pressao','massa','vazao','torque','potencia','volume'].forEach(c=>conv(c));}
