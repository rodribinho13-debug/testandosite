<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#475569;--primary-h:#334155;--primary-l:#F1F5F9;
  --accent:#F97316;--accent-2:#FB923C;--accent-l:#FFF7ED;
  --violet:#7C3AED;--violet-l:#F5F3FF;
  --t0:#FFFFFF;--t1:#FAFBFD;--t2:#F1F5F9;--t3:#E2E8F0;--t4:#CBD5E1;
  --t5:#94A3B8;--t6:#64748B;--t7:#334155;--t8:#1E293B;--t9:#0F172A;
  --success:#10B981;--success-l:#ECFDF5;--success-h:#065F46;
  --warning:#F59E0B;--warning-l:#FFFBEB;--warning-h:#92400E;
  --danger:#EF4444;--danger-l:#FEF2F2;--danger-h:#991B1B;
  --grad-ia:linear-gradient(135deg,#F97316 0%,#7C3AED 100%);
  --grad-deep-hero:radial-gradient(ellipse 1200px 600px at 75% -10%,rgba(249,115,22,.30),transparent 55%),radial-gradient(ellipse 900px 600px at 15% 110%,rgba(124,58,237,.28),transparent 55%),linear-gradient(180deg,#0A1628 0%,#13233F 100%);
  --sh-sm:0 1px 2px rgba(10,22,40,.06);--sh-lg:0 24px 60px rgba(10,22,40,.14);
  --r:10px;
}
html,body{height:100%}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;color:var(--t8);font-size:13px;background:var(--t1);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app-body{display:flex;flex:1;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;background:var(--t0);padding:12px 22px;border-bottom:1px solid var(--t3);min-height:58px}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-name{font-size:14.5px;font-weight:700;color:var(--t9)}
.hdr-sub{font-size:11px;color:var(--t6);margin-top:1px;font-weight:500}
.hdr-back{background:var(--t2);border:1px solid var(--t3);color:var(--t7);padding:7px 14px;border-radius:8px;font-size:12.5px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600}
.hdr-back:hover{background:var(--t3)}
.hdr-acts{display:flex;gap:8px;align-items:center}
.sidebar{width:256px;background:var(--t1);border-right:1px solid var(--t3);overflow-y:auto;padding:14px 0;flex-shrink:0}
.side-sec{padding:14px 18px 6px;font-size:10.5px;color:var(--t5);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.side-sec:first-child{margin-top:0;padding-top:6px}
.side-item{display:flex;align-items:center;gap:11px;padding:8px 18px;margin:0 8px;color:var(--t7);font-size:13px;cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;border-radius:7px;font-family:inherit;font-weight:500}
.side-item:hover{background:var(--t2);color:var(--t9)}
.side-item.active{background:var(--accent-l);color:var(--accent);font-weight:600;border-left:3px solid var(--accent);padding-left:15px}
.side-item .ico{width:18px;height:18px;flex-shrink:0;stroke-width:2}
.content{flex:1;overflow-y:auto;background:var(--t0)}
.bc-row{background:var(--t0);border-bottom:1px solid var(--t3);padding:12px 22px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t7);font-weight:500}
.sumbar{background:var(--t1);border-bottom:1px solid var(--t3);padding:14px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.sc{background:var(--t0);border:1px solid var(--t3);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh-sm)}
.slbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--t5);margin-bottom:6px;font-weight:700}
.sval{font-size:22px;font-weight:700;color:var(--t9);font-family:'JetBrains Mono',monospace;line-height:1}
.fbar{background:var(--t0);border-bottom:1px solid var(--t3);padding:12px 22px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto;background:var(--t0)}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px}
thead tr{background:var(--t1)}
th{padding:11px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t6);border-bottom:1px solid var(--t3);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--t3);color:var(--t8)}
tbody tr:hover{background:var(--t1)}
.mono{font-family:'JetBrains Mono',monospace}
.empty-st{text-align:center;padding:40px 20px;color:var(--t5);font-size:13px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;border:1px solid transparent}
.b-ok{background:var(--success-l);color:var(--success-h);border-color:#6EE7B7}
.b-pe{background:var(--warning-l);color:var(--warning-h);border-color:#FCD34D}
.b-in{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}
.btn,.bp,.bo,.bg{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;border-radius:var(--r);font-weight:600;font-size:12.5px;font-family:inherit;cursor:pointer;border:1px solid transparent;white-space:nowrap}
.bp{background:var(--accent);color:#fff;border-color:var(--accent)}
.bp:hover{background:var(--accent-2)}
.bg{background:transparent;color:var(--t8);border-color:var(--t3)}
.bg:hover{background:var(--t1)}
.bo{background:var(--t2);color:var(--t8);border-color:var(--t3)}
.bo:hover{background:var(--t3)}
.btn .lucide,.bp .lucide,.bg .lucide,.bo .lucide{width:14px;height:14px;flex-shrink:0;stroke-width:2}
.bp svg{color:#fff;stroke:#fff}
.b-edit,.b-del{background:transparent;border:1px solid transparent;cursor:pointer;color:var(--t6);width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;padding:0}
.b-edit:hover{background:var(--accent-l);color:var(--accent)}
.b-del:hover{background:var(--danger-l);color:var(--danger)}
.b-edit .lucide,.b-del .lucide{width:14px;height:14px}
.overlay{position:fixed;inset:0;background:rgba(10,22,40,.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.mbox{background:var(--t0);border-radius:14px;padding:24px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);position:relative}
.mclose{position:absolute;top:14px;right:14px;background:transparent;border:none;cursor:pointer;color:var(--t6);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mtitle{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;color:var(--t9);margin-bottom:18px}
.mtitle .lucide{width:18px;height:18px;stroke-width:2}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .f-full{grid-column:1/-1}
.fgrid label{display:block;font-size:11px;font-weight:600;color:var(--t6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fgrid input,.fgrid select,.fgrid textarea{width:100%;padding:8px 11px;border:1px solid var(--t3);border-radius:8px;font-size:12.5px;font-family:inherit;outline:none}
.fgrid input:focus,.fgrid select:focus,.fgrid textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l)}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--t3)}
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:5000}
.toast{padding:11px 16px;border-radius:10px;background:var(--t0);border:1px solid var(--t3);box-shadow:var(--sh-lg);font-size:13px;color:var(--t9);min-width:260px}
.toast.ok{border-left:3px solid var(--success)}
.toast.err{border-left:3px solid var(--danger)}
.toast.warn{border-left:3px solid var(--warning)}
#authMsg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--grad-deep-hero);z-index:500;padding:40px}
#authMsg.hidden{display:none}
.proj-ctx{background:var(--accent-l);border-bottom:1px solid var(--accent);padding:8px 22px;font-size:12px;color:var(--accent);display:flex;align-items:center;gap:10px}
.disc-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-l);color:var(--accent);border:1px solid var(--accent);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
</style>
</head>
<body>

<div id="authMsg">
  <div style="background:#fff;border-radius:14px;padding:32px 36px;max-width:380px;width:90%;box-shadow:var(--sh-lg);color:var(--t8)">
    <div style="text-align:center;margin-bottom:22px">
      <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" width="48" height="48" style="margin-bottom:10px">
        <defs><linearGradient id="hubAuthG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#F97316"/></linearGradient></defs>
        <path d="M 36 8 L 60 22 L 36 36 L 12 22 Z" fill="url(#hubAuthG)"/>
        <path d="M 12 22 L 36 36 L 36 64 L 12 50 Z" fill="#475569" opacity=".85"/>
        <path d="M 60 22 L 36 36 L 36 64 L 60 50 Z" fill="#F97316" opacity=".65"/>
        <circle cx="36" cy="36" r="5" fill="#fff"/>

</div>

<div class="app" id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-brand">
      <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" width="34" height="34">
        <defs><linearGradient id="hb1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#F97316"/></linearGradient></defs>
        <path d="M 36 8 L 60 22 L 36 36 L 12 22 Z" fill="url(#hb1)"/>
        <path d="M 12 22 L 36 36 L 36 64 L 12 50 Z" fill="#475569" opacity=".85"/>
        <path d="M 60 22 L 36 36 L 36 64 L 60 50 Z" fill="#F97316" opacity=".65"/>
        <circle cx="36" cy="36" r="5" fill="#fff"/>
      </svg>
      <div>
        <div class="hdr-name">PROJECT<span style="color:var(--accent)">.</span><span style="background:var(--grad-ia);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:800">IA</span> &middot; HUB Caldeiraria <span class="disc-chip"><i data-lucide="hammer" style="width:11px;height:11px"></i>CALDEIRARIA</span></div>
        <div class="hdr-sub">Estruturas Metálicas &middot; Perfis &middot; Fabricação &middot; Montagem &middot; Catálogos Gerdau/CSN</div>
      </div>
    </div>
    <div class="hdr-acts">
      <span id="userBadge" style="font-size:12px;color:var(--t6);font-weight:500"></span>
      <a class="hdr-back" href="hydrostec_v9.html"><i data-lucide="arrow-left" style="width:14px;height:14px"></i>Voltar</a>
    </div>

  <div id="projCtx" class="proj-ctx" style="display:none"></div>
  <div class="app-body">
    <aside class="sidebar">
      <div class="side-sec">Visao</div>
      <button class="side-item active" data-view="overview"><i data-lucide="layout-dashboard" class="ico"></i><span>Painel Caldeiraria</span></button>
      <div class="side-sec">Fabricacao &amp; Montagem</div>
      <button class="side-item" data-view="em"><i data-lucide="component" class="ico"></i><span>Estruturas Metálicas</span></button>
      <div class="side-sec">Engenharia</div>
      <button class="side-item" data-view="profiles"><i data-lucide="layers" class="ico"></i><span>Catalogo de Perfis</span></button>
      <button class="side-item" data-view="weldcalc"><i data-lucide="calculator" class="ico"></i><span>Calc. Pre-aquecimento</span></button>

  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const SUPABASE_URL='https://toapdhfouuedaexgqlsv.supabase.co';
const SUPABASE_KEY='sb_publishable_qVVBatpB_ppDLR6QcG8QgQ_hVYW0h8Q';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,storageKey:'hyd-auth',detectSessionInUrl:false}});
let _user=null,_org=null,_curProject=null;
const _cache={em:null,profiles:null};

function san(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function num(v,d=2){const n=parseFloat(v);if(isNaN(n))return '-';return n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDate(d){if(!d)return '-';try{return new Date(d).toLocaleDateString('pt-BR');}catch{return d;}}
function toast(msg,kind='ok'){const w=document.getElementById('toast-wrap');if(!w)return;const el=document.createElement('div');el.className='toast '+kind;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),3200);}
function _renderIcons(){try{lucide.createIcons();}catch(e){}}

async function hubLogin(){
  const em=document.getElementById('hub-em').value.trim(),pw=document.getElementById('hub-pw').value;
  const errEl=document.getElementById('hub-login-err');errEl.style.display='none';
  if(!em||!pw){errEl.textContent='Preencha email e senha';errEl.style.display='block';return;}
  const btn=document.getElementById('hub-login-btn');btn.disabled=true;btn.textContent='Entrando...';
  try{const {data,error}=await sb.auth.signInWithPassword({email:em,password:pw});if(error)throw error;_user=data.user;document.getElementById('authMsg').classList.add('hidden');document.getElementById('app').style.display='flex';await loadOrgProj();}
  catch(e){errEl.textContent='Erro: '+(e.message||e);errEl.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Entrar';}
}

async function loadOrgProj(){
  const {data:mem}=await sb.from('org_members').select('org_id,organizations(id,name)').eq('user_id',_user.id).limit(1).maybeSingle();
  if(!mem){toast('Sem organizacao','err');return;}
  _org=mem.organizations||{id:mem.org_id};
  const pid=new URLSearchParams(location.search).get('project');
  if(pid){
    const {data:p}=await sb.from('projects').select('id,name,code').eq('id',pid).maybeSingle();
    if(p){_curProject=p;document.getElementById('projCtx').style.display='flex';document.getElementById('projCtx').innerHTML='<i data-lucide="folder" style="width:14px;height:14px"></i> Projeto: <strong>'+san(p.name)+'</strong> <span style="color:var(--t6);font-weight:500">('+san(p.code||'-')+')</span>';}
  }
  document.getElementById('userBadge').textContent=_user.email;
  _renderIcons();
  document.querySelectorAll('.side-item').forEach(b=>{b.onclick=()=>go(b.dataset.view);});
  window._org=_org; window._user=_user; window._curProject=_curProject; window.sb=sb;
  window.SUPABASE_URL=SUPABASE_URL; window.SUPABASE_KEY=SUPABASE_KEY;
  if(window.CustomViews){
    const sb_el=document.querySelector('.sidebar');
    if(sb_el)await CustomViews.renderSidebarItems(sb_el,'caldeiraria');
    document.addEventListener('cv-changed',async(e)=>{if(e.detail.scope==='caldeiraria'&&sb_el)await CustomViews.renderSidebarItems(sb_el,'caldeiraria');});
  }
  go('overview');
}
function go(v){document.querySelectorAll('.side-item').forEach(b=>b.classList.toggle('active',b.dataset.view===v));if(VIEWS[v])VIEWS[v]();setTimeout(_renderIcons,50);}

async function loadEM(){if(!_curProject)return [];const {data}=await sb.from('structural_em_records').select('*').eq('project_id',_curProject.id).is('deleted_at',null).order('tag');return data||[];}
async function loadProfiles(){if(_cache.profiles)return _cache.profiles;const {data}=await sb.from('structural_profiles_catalog').select('*').order('family').order('designation');_cache.profiles=data||[];return _cache.profiles;}

async function renderOverview(){
  if(!_curProject){document.getElementById('content').innerHTML='<div class="empty-st" style="padding:60px 22px"><i data-lucide="alert-circle" style="width:36px;height:36px;color:var(--warning);margin-bottom:12px"></i><div style="font-size:15px;color:var(--t8);font-weight:600">Selecione um projeto</div><div style="font-size:12px;color:var(--t6);margin-top:6px">Abra um projeto com a disciplina Caldeiraria ativa.</div><div style="margin-top:18px"><a href="hydrostec_v9.html" class="btn bp" style="text-decoration:none"><i data-lucide="arrow-left"></i>Ir ao sistema</a></div></div>';_renderIcons();return;}
  const ems=await loadEM();
  const pesoTotal=ems.reduce((s,r)=>s+(parseFloat(r.peso_kg)||0),0);
  const fab=ems.filter(r=>r.fab_status==='fabricado'||r.fab_status==='concluido').length;
  const mont=ems.filter(r=>r.mont_status==='montado'||r.mont_status==='concluido').length;
  document.getElementById('content').innerHTML=
    '<div class="bc-row"><i data-lucide="layout-dashboard" style="width:14px;height:14px"></i> Painel Caldeiraria</div>'
    +'<div class="sumbar">'
    +'<div class="sc"><div class="slbl">Estruturas</div><div class="sval">'+ems.length+'</div></div>'
    +'<div class="sc"><div class="slbl">Peso total (kg)</div><div class="sval">'+num(pesoTotal,0)+'</div></div>'
    +'<div class="sc"><div class="slbl">Peso total (t)</div><div class="sval">'+num(pesoTotal/1000,2)+'</div></div>'
    +'<div class="sc"><div class="slbl">% Fabricado</div><div class="sval">'+(ems.length?Math.round(fab*100/ems.length):0)+'%</div></div>'
    +'<div class="sc"><div class="slbl">% Montado</div><div class="sval">'+(ems.length?Math.round(mont*100/ems.length):0)+'%</div></div>'
    +'</div>'
    +'<div style="padding:22px">'

function editEM(id){

  openModal('Estrutura Metalica','component',[
    {k:'tag',l:'TAG',req:true},
    {k:'tipo',l:'Tipo',type:'select',opts:['','skid','escada','plataforma','torre','suporte','treliça','viga','pilar','passarela','outro']},
    {k:'localizacao',l:'Localizacao'},
    {k:'ref_drawing',l:'Ref Desenho'},
    {k:'peso_kg',l:'Peso kg',type:'number',step:'0.1'},
    {k:'fab_status',l:'Fab Status',type:'select',opts:['pendente','liberado_fab','em_fabricacao','fabricado','concluido']},
    {k:'fab_date',l:'Data Fab',type:'date'},
    {k:'responsavel_fab',l:'Responsavel Fab'},
    {k:'mont_status',l:'Mont Status',type:'select',opts:['pendente','liberado_mont','em_montagem','montado','concluido']},
    {k:'mont_date',l:'Data Mont',type:'date'},
    {k:'responsavel_mont',l:'Responsavel Mont'},
    {k:'notes',l:'Obs',full:true,type:'textarea'}

function renderWeldCalc(){
  document.getElementById('content').innerHTML=
    '<div class="bc-row"><i data-lucide="calculator" style="width:14px;height:14px"></i> Calculadora de Pre-Aquecimento (AWS D1.1)</div>'
    +'<div style="padding:24px;max-width:680px;margin:0 auto">'
    +'<div style="background:var(--warning-l);border-left:4px solid var(--warning);padding:12px 16px;border-radius:10px;margin-bottom:14px;font-size:12.5px;color:var(--warning-h)"><strong>⚠ Regra IIW:</strong> CE = C + Mn/6 + (Cr+Mo+V)/5 + (Ni+Cu)/15. Pre-aquecimento obrigatorio se CE &gt; 0.45 ou espessura &gt; 25 mm.</div>'
    +'<div style="background:var(--t1);border:1px solid var(--t3);border-radius:12px;padding:20px"><div class="fgrid">'
    +'<div><label>Carbono C (%)</label><input id="wC" type="number" step="0.01" value="0.18" oninput="calcWeld()"></div>'
    +'<div><label>Manganes Mn (%)</label><input id="wMn" type="number" step="0.01" value="1.2" oninput="calcWeld()"></div>'
    +'<div><label>Cromo Cr (%)</label><input id="wCr" type="number" step="0.01" value="0" oninput="calcWeld()"></div>'
    +'<div><label>Molibdenio Mo (%)</label><input id="wMo" type="number" step="0.01" value="0" oninput="calcWeld()"></div>'
    +'<div><label>Vanadio V (%)</label><input id="wV" type="number" step="0.01" value="0" oninput="calcWeld()"></div>'
    +'<div><label>Niquel Ni (%)</label><input id="wNi" type="number" step="0.01" value="0" oninput="calcWeld()"></div>'
    +'<div><label>Cobre Cu (%)</label><input id="wCu" type="number" step="0.01" value="0" oninput="calcWeld()"></div>'
    +'<div><label>Espessura mm</label><input id="wT" type="number" step="0.5" value="12" oninput="calcWeld()"></div>'
    +'</div><div id="wRes" style="margin-top:18px"></div></div></div>';
  calcWeld();
  _renderIcons();
}

function calcWeld(){
  const C=parseFloat(document.getElementById('wC').value)||0;
  const Mn=parseFloat(document.getElementById('wMn').value)||0;
  const Cr=parseFloat(document.getElementById('wCr').value)||0;
  const Mo=parseFloat(document.getElementById('wMo').value)||0;
  const V=parseFloat(document.getElementById('wV').value)||0;
  const Ni=parseFloat(document.getElementById('wNi').value)||0;
  const Cu=parseFloat(document.getElementById('wCu').value)||0;
  const t=parseFloat(document.getElementById('wT').value)||0;
  const CE = C + Mn/6 + (Cr+Mo+V)/5 + (Ni+Cu)/15;
  let tempPre = 0;
  if(CE > 0.55) tempPre = 200;
  else if(CE > 0.50) tempPre = 150;
  else if(CE > 0.45) tempPre = 100;
  else if(t > 50) tempPre = 100;
  else if(t > 25) tempPre = 50;
  const req = CE > 0.45 || t > 25;
  document.getElementById('wRes').innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    +'<div style="background:#fff;border:1px solid var(--t3);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--t6);text-transform:uppercase;font-weight:600">Carbono Equivalente</div><div style="font-size:28px;font-weight:800;color:'+(CE>0.45?'var(--danger-h)':'var(--success-h)')+';font-family:JetBrains Mono,monospace">'+CE.toFixed(3)+'</div></div>'
    +'<div style="background:#fff;border:1px solid var(--t3);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--t6);text-transform:uppercase;font-weight:600">Pre-aquecimento</div><div style="font-size:28px;font-weight:800;color:var(--accent);font-family:JetBrains Mono,monospace">'+tempPre+' °C</div></div>'
    +'</div>'
    +'<div style="margin-top:12px;padding:12px 14px;border-radius:8px;font-size:12.5px;font-weight:600;'+(req?'background:var(--warning-l);color:var(--warning-h);border:1px solid var(--warning)':'background:var(--success-l);color:var(--success-h);border:1px solid var(--success)')+'">'+(req?'⚠ Pre-aquecimento OBRIGATORIO ('+(CE>0.45?'CE > 0.45':'espessura > 25mm')+')':'✓ Pre-aquecimento nao obrigatorio')+'</div>';
}

function openModal(title,icon,fields,current,onSave){
  const overlay=document.createElement('div');overlay.className='overlay';overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML='<div class="mbox"><button class="mclose" onclick="this.closest(\'.overlay\').remove()"><i data-lucide="x"></i></button>'
    +'<div class="mtitle"><i data-lucide="'+icon+'"></i>'+title+'</div>'
    +'<div class="fgrid">'+fields.map(f=>{
        const v=current?(current[f.k]==null?'':current[f.k]):'';
        let inp;
        if(f.type==='select'){const opts=(f.opts||[]).map(o=>'<option value="'+san(o)+'" '+(String(v)===String(o)?'selected':'')+'>'+san(o||'-')+'</option>').join('');inp='<select data-k="'+f.k+'">'+opts+'</select>';}
        else if(f.type==='textarea'){inp='<textarea data-k="'+f.k+'" rows="3">'+san(v)+'</textarea>';}
        else {inp='<input data-k="'+f.k+'" type="'+(f.type||'text')+'" '+(f.step?'step="'+f.step+'"':'')+' value="'+san(v)+'">';}
        return '<div class="'+(f.full?'f-full':'')+'"><label>'+f.l+(f.req?' *':'')+'</label>'+inp+'</div>';
      }).join('')+'</div><div class="mfooter"><button class="btn bg" onclick="this.closest(\'.overlay\').remove()">Cancelar</button><button class="btn bp" id="modalSave"><i data-lucide="save"></i>Salvar</button></div></div>';
  document.body.appendChild(overlay);_renderIcons();
  overlay.querySelector('#modalSave').onclick=async()=>{const vals={};fields.forEach(f=>{const el=overlay.querySelector('[data-k="'+f.k+'"]');let val=el.value;if(f.type==='number'){val=val===''?null:parseFloat(val);}if(val==='')val=null;vals[f.k]=val;});const ok=await onSave(vals);if(ok)overlay.remove();};
}

async function aiProcess(input,doctype){
  const file=input.files&&input.files[0];if(!file)return;
  const st=document.getElementById('ia-st');
  st.innerHTML='<div style="background:var(--accent-l);border:1px solid var(--accent);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--accent)">Analisando com IA...</div>';
  try{
    let mime=file.type,b64;
    if(file.name.toLowerCase().endsWith('.xlsx')){const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const csv=XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);b64=btoa(unescape(encodeURIComponent(csv)));mime='text/csv';}
    else {b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
    const {data:{session}}=await sb.auth.getSession();
    const resp=await fetch(SUPABASE_URL+'/functions/v1/analyze-discipline-doc',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+(session?.access_token||SUPABASE_KEY)},body:JSON.stringify({file:b64,mime,project_id:_curProject.id,discipline_code:'caldeiraria',document_type:doctype})});
    const data=await resp.json();
    if(!resp.ok||data.error){st.innerHTML='<div style="background:var(--danger-l);color:var(--danger-h);border:1px solid var(--danger);border-radius:8px;padding:11px 14px;font-size:12px">Erro: '+(data.error||resp.status)+'</div>';return;}
    let records=[];for(const k of ['records','items','data','estruturas','perfis']){if(Array.isArray(data[k])){records=data[k];break;}}
    if(!records.length){for(const k in data){if(Array.isArray(data[k])&&data[k].length){records=data[k];break;}}}
    const tbl=doctype==='estruturas_metalicas'?'structural_em_records':'structural_profiles_catalog';
    const tagKey=doctype==='estruturas_metalicas'?'tag':'designation';
    let added=0,skipped=[];
    for(const rec of records){
      const r={...rec};
      if(doctype==='estruturas_metalicas'){r.org_id=_org.id;r.project_id=_curProject.id;}
      if(!r[tagKey]){skipped.push('sem '+tagKey);continue;}
      delete r.id;delete r.created_at;
      const {error}=await sb.from(tbl).insert(r);
      if(error){skipped.push(r[tagKey]+': '+error.message);continue;}
      added++;
    }
    st.innerHTML='<div style="background:var(--success-l);color:var(--success-h);border:1px solid var(--success);border-radius:8px;padding:11px 14px;font-size:12px"><strong>Concluido:</strong> '+added+' cadastrados / '+skipped.length+' descartados.</div>'
      +(skipped.length?'<div style="margin-top:8px;background:var(--warning-l);border:1px solid var(--warning);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--warning-h);max-height:120px;overflow:auto"><strong>Descartados:</strong><ul style="margin:4px 0 0 16px;padding:0">'+skipped.map(s=>'<li>'+san(s)+'</li>').join('')+'</ul></div>':'');
    if(added){setTimeout(()=>{document.getElementById('ia-up-ov')?.remove();if(doctype==='estruturas_metalicas')renderEM();else{_cache.profiles=null;renderProfiles();}},1800);}
  } catch(e){st.innerHTML='<div style="background:var(--danger-l);color:var(--danger-h);border:1px solid var(--danger);border-radius:8px;padding:11px 14px;font-size:12px">Erro: '+(e.message||e)+'</div>';}
}
