<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0A1628;--ink-2:#13233F;--ink-3:#1B2D4E;
  --primary:#92400E;--primary-h:#B45309;--primary-l:#FEF3C7;
  --accent:#D97706;--accent-2:#F59E0B;--accent-l:#FFFBEB;
  --violet:#7C3AED;--violet-l:#F5F3FF;
  --t0:#FFFFFF;--t1:#FAFBFD;--t2:#F1F5F9;--t3:#E2E8F0;--t4:#CBD5E1;
  --t5:#94A3B8;--t6:#64748B;--t7:#334155;--t8:#1E293B;--t9:#0F172A;
  --success:#10B981;--success-l:#ECFDF5;--success-h:#065F46;
  --warning:#F59E0B;--warning-l:#FFFBEB;--warning-h:#92400E;
  --danger:#EF4444;--danger-l:#FEF2F2;--danger-h:#991B1B;
  --bg:var(--t0);--bg2:var(--t1);
  --grad-marca:linear-gradient(135deg,#92400E 0%,#F59E0B 100%);
  --grad-ia:linear-gradient(135deg,#D97706 0%,#7C3AED 100%);
  --grad-deep-hero:radial-gradient(ellipse 1200px 600px at 75% -10%,rgba(217,119,6,.30),transparent 55%),radial-gradient(ellipse 900px 600px at 15% 110%,rgba(124,58,237,.28),transparent 55%),linear-gradient(180deg,#0A1628 0%,#13233F 100%);
  --sh-sm:0 1px 2px rgba(10,22,40,.06);--sh:0 8px 24px rgba(10,22,40,.08);--sh-lg:0 24px 60px rgba(10,22,40,.14);
  --r-sm:6px;--r:10px;--r-md:14px;--r-lg:18px;
}
html,body{height:100%}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;color:var(--t8);font-size:13px;background:var(--t1);-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app-body{display:flex;flex:1;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;background:var(--t0);padding:12px 22px;border-bottom:1px solid var(--t3);min-height:58px}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-name{font-size:14.5px;font-weight:700;color:var(--t9);letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--t6);margin-top:1px;font-weight:500}
.hdr-back{background:var(--t2);border:1px solid var(--t3);color:var(--t7);padding:7px 14px;border-radius:8px;font-size:12.5px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600}
.hdr-back:hover{background:var(--t3);color:var(--t9)}
.hdr-acts{display:flex;gap:8px;align-items:center}
.sidebar{width:256px;background:var(--t1);border-right:1px solid var(--t3);overflow-y:auto;padding:14px 0;flex-shrink:0}
.side-sec{padding:14px 18px 6px;font-size:10.5px;color:var(--t5);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-top:4px}
.side-sec:first-child{margin-top:0;padding-top:6px}
.side-item{display:flex;align-items:center;gap:11px;padding:8px 18px;margin:0 8px;color:var(--t7);font-size:13px;cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;border-radius:7px;font-family:inherit;font-weight:500}

.sumbar{background:var(--t1);border-bottom:1px solid var(--t3);padding:14px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}

.bp svg{color:#fff;stroke:#fff}
.bc svg{color:#fff;stroke:#fff}
.b-edit,.b-del{background:transparent;border:1px solid transparent;cursor:pointer;color:var(--t6);width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;padding:0;margin-left:2px}
.b-edit:hover{background:var(--primary-l);color:var(--primary-h)}
.b-del:hover{background:var(--danger-l);color:var(--danger)}
.b-edit .lucide,.b-del .lucide{width:14px;height:14px}
.overlay{position:fixed;inset:0;background:rgba(10,22,40,.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.overlay.open{display:flex}
.mbox{background:var(--t0);border-radius:14px;padding:24px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);position:relative}
.mclose{position:absolute;top:14px;right:14px;background:transparent;border:none;cursor:pointer;color:var(--t6);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--t2);color:var(--t9)}
.mclose .lucide{width:14px;height:14px}
.mtitle{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;color:var(--t9);margin-bottom:18px;letter-spacing:-.2px}
.mtitle .lucide{width:18px;height:18px;flex-shrink:0;stroke-width:2}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .f-full{grid-column:1/-1}
.fgrid label{display:block;font-size:11px;font-weight:600;color:var(--t6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fgrid input,.fgrid select,.fgrid textarea{width:100%;padding:8px 11px;border:1px solid var(--t3);border-radius:8px;font-size:12.5px;background:var(--t0);color:var(--t9);font-family:inherit;outline:none}
.fgrid input:focus,.fgrid select:focus,.fgrid textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--t3)}
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:5000}
.toast{padding:11px 16px;border-radius:10px;background:var(--t0);border:1px solid var(--t3);box-shadow:var(--sh-lg);font-size:13px;color:var(--t9);font-weight:500;min-width:260px;animation:slidein .2s}
.toast.ok{border-left:3px solid var(--success)}
.toast.err{border-left:3px solid var(--danger)}
.toast.warn{border-left:3px solid var(--warning)}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
#authMsg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--grad-deep-hero);z-index:500;padding:40px}
#authMsg.hidden{display:none}
.proj-ctx{background:var(--primary-l);border-bottom:1px solid var(--primary);padding:8px 22px;font-size:12px;color:var(--primary-h);display:flex;align-items:center;gap:10px}
.proj-ctx strong{font-weight:700}
.disc-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-l);color:var(--accent);border:1px solid var(--accent);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
</style>

<script>
const SUPABASE_URL = 'https://toapdhfouuedaexgqlsv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qVVBatpB_ppDLR6QcG8QgQ_hVYW0h8Q';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{persistSession:true, storageKey:'hyd-auth', detectSessionInUrl:false}});

let _user=null, _org=null, _curProject=null;
const _cache = { pours:null, elements:null, tests:null, insumos:null };

function san(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function num(v,d=2){const n=parseFloat(v); if(isNaN(n))return '-'; return n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDate(d){if(!d)return '-';try{return new Date(d).toLocaleDateString('pt-BR');}catch{return d;}}
function toast(msg, kind='ok'){
  const w=document.getElementById('toast-wrap'); if(!w)return;
  const el=document.createElement('div'); el.className='toast '+kind; el.textContent=msg;
  w.appendChild(el); setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(100%)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300);},3200);
}
function _renderIcons(){try{lucide.createIcons();}catch(e){}}

// ===========================================================
// AUTH
// ===========================================================
async function hubLogin(){
  const em = document.getElementById('hub-em').value.trim();
  const pw = document.getElementById('hub-pw').value;
  const errEl = document.getElementById('hub-login-err');
  errEl.style.display='none';
  if(!em||!pw){errEl.textContent='Preencha email e senha';errEl.style.display='block';return;}
  const btn = document.getElementById('hub-login-btn'); btn.disabled=true; btn.textContent='Entrando...';
  try{
    const {data,error} = await sb.auth.signInWithPassword({email:em, password:pw});
    if(error){throw error;}
    if(data?.user){ _user = data.user; document.getElementById('authMsg').classList.add('hidden'); document.getElementById('app').style.display='flex'; await loadOrgProj(); }
  } catch(e){
    errEl.textContent = 'Erro: '+(e.message||e); errEl.style.display='block';
  } finally{ btn.disabled=false; btn.textContent='Entrar'; }
}

async function loadOrgProj(){
  // Carrega org
  const {data:mem} = await sb.from('org_members').select('org_id, organizations(id,name)').eq('user_id', _user.id).limit(1).maybeSingle();
  if(!mem){toast('Sem organizacao vinculada','err'); return;}
  _org = mem.organizations || {id:mem.org_id};

  // Projeto via URL
  const params = new URLSearchParams(location.search);
  const pid = params.get('project');
  if(pid){
    const {data:p} = await sb.from('projects').select('id,name,code').eq('id',pid).maybeSingle();
    if(p){
      // Verifica se projeto tem disciplina civil
      const {data:pd} = await sb.from('project_disciplines').select('id').eq('project_id',p.id).eq('discipline_code','civil').maybeSingle();
      if(!pd){
        document.getElementById('projCtx').style.display='flex';
        document.getElementById('projCtx').innerHTML = '<i data-lucide="alert-triangle" style="width:14px;height:14px"></i> Projeto <strong>'+san(p.name)+'</strong> nao tem disciplina Civil ativada. <a href="hydrostec_v9.html?project='+p.id+'" style="color:var(--primary-h);text-decoration:underline;font-weight:600">Ativar agora</a>';
      }
      _curProject = p;
      document.getElementById('projCtx').style.display='flex';
      document.getElementById('projCtx').innerHTML = '<i data-lucide="folder" style="width:14px;height:14px"></i> Projeto: <strong>'+san(p.name)+'</strong> <span style="color:var(--t6);font-weight:500">('+san(p.code||'-')+')</span>';
    }
  }
  document.getElementById('userBadge').textContent = _user.email;
  _renderIcons();
  // Wire sidebar
  document.querySelectorAll('.side-item').forEach(b=>{ b.onclick=()=>go(b.dataset.view); });
  // Expor contexto pro modulo custom_views
  window._org=_org; window._user=_user; window._curProject=_curProject; window.sb=sb;
  window.SUPABASE_URL=SUPABASE_URL; window.SUPABASE_KEY=SUPABASE_KEY;
  if(window.CustomViews){
    const sb_el = document.querySelector('.sidebar');
    if(sb_el) await CustomViews.renderSidebarItems(sb_el,'civil');
    document.addEventListener('cv-changed', async (e)=>{ if(e.detail.scope==='civil' && sb_el) await CustomViews.renderSidebarItems(sb_el,'civil'); });
  }
  go('overview');
}

function go(v){
  document.querySelectorAll('.side-item').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  if(VIEWS[v]) VIEWS[v]();
  setTimeout(_renderIcons,50);
}

// ===========================================================
// HELPERS DATA
// ===========================================================
async function loadPours(){
  if(!_curProject)return [];
  const {data,error} = await sb.from('civil_concrete_pours').select('*').eq('project_id',_curProject.id).is('deleted_at',null).order('pour_date',{ascending:false});
  if(error){toast('Erro: '+error.message,'err');return [];}
  return data||[];
}
async function loadElements(){
  if(!_curProject)return [];
  const {data,error} = await sb.from('civil_concrete_elements').select('*').eq('project_id',_curProject.id).is('deleted_at',null).order('tag');
  if(error){toast('Erro: '+error.message,'err');return [];}
  return data||[];
}
async function loadTests(){
  if(!_curProject)return [];
  // tests ligam-se a pours via pour_id
  const pours = await loadPours();
  if(!pours.length) return [];
  const ids = pours.map(p=>p.id);
  const {data,error} = await sb.from('civil_concrete_tests').select('*').in('pour_id',ids).order('test_date',{ascending:false});
  if(error){toast('Erro: '+error.message,'err');return [];}
  return (data||[]).map(t=>{ const p=pours.find(x=>x.id===t.pour_id); return {...t, pour_number:p?.pour_number||'-', element_type:p?.element_type||'-'}; });
}
async function loadInsumos(){
  if(_cache.insumos) return _cache.insumos;
  const {data,error} = await sb.from('civil_insumos_catalog').select('*').order('category').order('description');
  if(error){toast('Erro: '+error.message,'err');return [];}
  _cache.insumos = data||[];
  return _cache.insumos;
}

async function renderOverview(){
  if(!_curProject){
    document.getElementById('content').innerHTML = '<div class="empty-st" style="padding:60px 22px"><i data-lucide="alert-circle" style="width:36px;height:36px;color:var(--warning);margin-bottom:12px"></i><div style="font-size:15px;color:var(--t8);font-weight:600;margin-bottom:6px">Selecione um projeto</div><div style="font-size:12px;color:var(--t6)">Volte ao sistema, abra um projeto que tenha a disciplina <strong>Civil</strong> ativa e entre no HUB Civil dele.</div><div style="margin-top:18px"><a href="hydrostec_v9.html" class="btn bp" style="text-decoration:none"><i data-lucide="arrow-left"></i>Ir ao sistema</a></div></div>';
    _renderIcons();
    return;
  }
  const [pours, elems, tests] = await Promise.all([loadPours(), loadElements(), loadTests()]);
  const volTotal = pours.reduce((s,p)=>s+(parseFloat(p.volume_m3)||0),0);
  const acoTotal = elems.reduce((s,e)=>s+(parseFloat(e.steel_weight_kg)||0),0);
  const formaTotal = elems.reduce((s,e)=>s+(parseFloat(e.form_area_m2)||0),0);
  const testsOk = tests.filter(t=>t.result==='aprovado'||(parseFloat(t.resistance_mpa)||0) >= (parseFloat(t.required_mpa)||0)).length;
  const testsPct = tests.length ? Math.round(testsOk*100/tests.length) : 0;
  const elemConc = elems.filter(e=>e.status==='concretado'||e.status==='executado').length;
  const elemPct = elems.length ? Math.round(elemConc*100/elems.length) : 0;
  document.getElementById('content').innerHTML =
    '<div class="bc-row"><i data-lucide="layout-dashboard" style="width:14px;height:14px"></i> Painel Civil</div>'
    + '<div class="sumbar">'
    + '<div class="sc"><div class="slbl">Concretagens</div><div class="sval">'+pours.length+'</div></div>'
    + '<div class="sc"><div class="slbl">Volume total (m3)</div><div class="sval">'+num(volTotal,1)+'</div></div>'
    + '<div class="sc"><div class="slbl">Elementos cadastrados</div><div class="sval">'+elems.length+'</div></div>'
    + '<div class="sc"><div class="slbl">% Executados</div><div class="sval">'+elemPct+'%</div></div>'
    + '<div class="sc"><div class="slbl">Peso aco (kg)</div><div class="sval">'+num(acoTotal,0)+'</div></div>'
    + '<div class="sc"><div class="slbl">Area de formas (m2)</div><div class="sval">'+num(formaTotal,1)+'</div></div>'
    + '<div class="sc"><div class="slbl">Ensaios totais</div><div class="sval">'+tests.length+'</div></div>'
    + '<div class="sc"><div class="slbl">% Ensaios OK</div><div class="sval" style="color:'+(testsPct>=95?'var(--success-h)':testsPct>=80?'var(--warning-h)':'var(--danger-h)')+'">'+testsPct+'%</div></div>'
    + '</div>'
    + '<div style="padding:22px"><div style="background:var(--accent-l);border-left:3px solid var(--accent);padding:12px 16px;border-radius:8px;font-size:13px;color:var(--accent);margin-bottom:18px"><strong>HUB Civil em uso.</strong> Navegue pelas abas a esquerda para gerenciar concretagens, elementos estruturais, ensaios de CP e insumos SINAPI/TCPO.</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px">'
    + cardLink('cuboid','Concretagens','Fichas de concretagem com fck, traco, slump, fornecedor','pours')
    + cardLink('square-stack','Elementos','Sapatas, pilares, vigas, lajes com volumes e armaduras','elements')
    + cardLink('flask-conical','Ensaios CP','Rompimento de corpos de prova - NBR 5739','tests')
    + cardLink('hard-hat','Insumos SINAPI','Catalogo de insumos civis para orcamento','insumos')
    + '</div></div>';
  _renderIcons();
}
function cardLink(icon, title, desc, view){
  return '<div onclick="go(\''+view+'\')" style="background:var(--t0);border:1px solid var(--t3);border-radius:12px;padding:18px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor=\'var(--accent)\';this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.borderColor=\'var(--t3)\';this.style.transform=\'\'">'
    + '<i data-lucide="'+icon+'" style="width:22px;height:22px;color:var(--accent);margin-bottom:10px"></i>'
    + '<div style="font-size:14px;font-weight:700;color:var(--t9);margin-bottom:4px">'+title+'</div>'
    + '<div style="font-size:12px;color:var(--t6);line-height:1.5">'+desc+'</div></div>';
}

async function renderInsumos(){
  const rows = await loadInsumos();
  let categoria = '';
  let busca = '';
  function draw(){
    const filt = rows.filter(r=> (!categoria || r.category===categoria) && (!busca || (r.description||'').toLowerCase().includes(busca.toLowerCase()) || (r.code||'').toLowerCase().includes(busca.toLowerCase())));
    const cats = [...new Set(rows.map(r=>r.category).filter(Boolean))].sort();
    document.getElementById('content').innerHTML =
      '<div class="bc-row"><i data-lucide="hard-hat" style="width:14px;height:14px"></i> Insumos Civis SINAPI / TCPO &middot; Catalogo de referencia</div>'
      + '<div class="sumbar">'
      + '<div class="sc"><div class="slbl">Total insumos</div><div class="sval">'+rows.length+'</div></div>'
      + '<div class="sc"><div class="slbl">Filtrados</div><div class="sval">'+filt.length+'</div></div>'
      + '<div class="sc"><div class="slbl">Categorias</div><div class="sval">'+cats.length+'</div></div>'
      + '</div>'
      + '<div class="fbar">'
      + '<select id="insCat" style="padding:8px 11px;border:1px solid var(--t3);border-radius:8px;font-size:12.5px;background:#fff"><option value="">Todas categorias</option>'+cats.map(c=>'<option '+(c===categoria?'selected':'')+'>'+san(c)+'</option>').join('')+'</select>'
      + '<input id="insBusca" placeholder="Buscar codigo ou descricao..." value="'+san(busca)+'" style="flex:1;min-width:200px;padding:8px 11px;border:1px solid var(--t3);border-radius:8px;font-size:12.5px">'
      + '<button class="btn bg" onclick="exportXlsx(\'insumos_civis\', _cache.insumos)"><i data-lucide="download"></i>Exportar</button>'
      + '</div>'
      + '<div class="tbl-wrap"><table><thead><tr>'
      + '<th>Codigo</th><th>Categoria</th><th>Descricao</th><th>Unid</th><th>HH/un</th><th>Material BRL</th><th>Total BRL</th><th>Fonte</th>'
      + '</tr></thead><tbody>'
      + (filt.length ? filt.slice(0,500).map(r=>'<tr>'
          +'<td class="mono">'+san(r.code||'-')+'</td>'
          +'<td>'+san(r.category||'-')+'</td>'
          +'<td>'+san(r.description||'-')+'</td>'
          +'<td class="mono">'+san(r.unit||'-')+'</td>'
          +'<td class="mono">'+num(r.hh_per_unit,3)+'</td>'
          +'<td class="mono">R$ '+num(r.material_cost_brl,2)+'</td>'
          +'<td class="mono">R$ '+num(r.total_cost_brl,2)+'</td>'
          +'<td><span class="badge b-in">'+san(r.source||'-')+'</span></td>'
          +'</tr>').join('') : '<tr><td colspan="8" class="empty-st">Nenhum insumo encontrado com este filtro.</td></tr>')
      + '</tbody></table></div>'
      + (filt.length > 500 ? '<div style="padding:14px 22px;font-size:12px;color:var(--t6)">Mostrando 500 de '+filt.length+' resultados. Use o filtro para refinar.</div>' : '');
    document.getElementById('insCat').onchange = (e)=>{categoria=e.target.value;draw();};
    document.getElementById('insBusca').oninput = (e)=>{busca=e.target.value;clearTimeout(window._insTimer);window._insTimer=setTimeout(draw,250);};
    _renderIcons();
  }
  draw();
}

function openModal(title, icon, fields, current, onSave){
  const overlay = document.createElement('div');
  overlay.className = 'overlay open';
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  const html = '<div class="mbox"><button class="mclose" onclick="this.closest(\'.overlay\').remove()"><i data-lucide="x"></i></button>'
    + '<div class="mtitle"><i data-lucide="'+icon+'"></i>'+title+'</div>'
    + '<div class="fgrid">'+fields.map(f=>{
        const v = current ? (current[f.k]==null?'':current[f.k]) : '';
        let inp;
        if(f.type==='select'){
          let opts;
          if(f.optsObj){
            opts = f.optsObj.map(o=>'<option value="'+san(o.val)+'" '+(String(v)===String(o.val)?'selected':'')+'>'+san(o.label)+'</option>').join('');
          } else {
            opts = (f.opts||[]).map(o=>'<option value="'+san(o)+'" '+(String(v)===String(o)?'selected':'')+'>'+san(o||'-')+'</option>').join('');
          }
          inp = '<select data-k="'+f.k+'" '+(f.req?'required':'')+'>'+opts+'</select>';
        } else if(f.type==='textarea'){
          inp = '<textarea data-k="'+f.k+'" rows="3">'+san(v)+'</textarea>';
        } else {
          inp = '<input data-k="'+f.k+'" type="'+(f.type||'text')+'" '+(f.step?'step="'+f.step+'"':'')+' '+(f.req?'required':'')+' value="'+san(v)+'">';
        }
        return '<div class="'+(f.full?'f-full':'')+'"><label>'+f.l+(f.req?' *':'')+'</label>'+inp+'</div>';
      }).join('')
    + '</div>'
    + '<div class="mfooter"><button class="btn bg" onclick="this.closest(\'.overlay\').remove()">Cancelar</button><button class="btn bp" id="modalSave"><i data-lucide="save"></i>Salvar</button></div>'
    + '</div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  _renderIcons();
  overlay.querySelector('#modalSave').onclick = async ()=>{
    const vals = {};
    fields.forEach(f=>{
      const el = overlay.querySelector('[data-k="'+f.k+'"]');
      let val = el.value;
      if(f.type==='number'){ val = val === '' ? null : parseFloat(val); }
      if(val === '') val = null;
      vals[f.k] = val;
    });
    const ok = await onSave(vals);
    if(ok) overlay.remove();
  };
}

async function delRec(table, id, refresh){
  if(!confirm('Excluir este registro?'))return;
  const {error} = await sb.from(table).update({deleted_at:new Date().toISOString()}).eq('id',id);
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('Excluido','ok');
  refresh();
}

function exportXlsx(name, data){
  if(!data || !data.length){toast('Sem dados','warn');return;}
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, name.slice(0,30));
  XLSX.writeFile(wb, name+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Exportado','ok');
}

async function aiProcess(input, disc, doctype){
  const file = input.files && input.files[0]; if(!file)return;
  const st = document.getElementById('ia-st');
  st.innerHTML = '<div style="background:var(--primary-l);border:1px solid var(--primary);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--primary-h)">Analisando com IA...</div>';
  try {
    let mime = file.type, b64;
    if(file.name.toLowerCase().endsWith('.xlsx')){
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf,{type:'array'});
      const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);
      b64 = btoa(unescape(encodeURIComponent(csv))); mime = 'text/csv';
    } else {
      b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    }
    const {data:{session}} = await sb.auth.getSession();
    const resp = await fetch(SUPABASE_URL+'/functions/v1/analyze-discipline-doc', {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+(session?.access_token||SUPABASE_KEY)},
      body: JSON.stringify({file:b64, mime, project_id:_curProject.id, discipline_code:disc, document_type:doctype})
    });
    const data = await resp.json();
    if(!resp.ok || data.error){ st.innerHTML='<div style="background:var(--danger-l);color:var(--danger-h);border:1px solid var(--danger);border-radius:8px;padding:11px 14px;font-size:12px">Erro: '+(data.error||resp.status)+'</div>';return; }
    // Procura array de records (records, items, data, ou primeira chave que for array)
    let records = [];
    const candidates = ['records','items','data','concretagens','elementos','insumos'];
    for(const k of candidates){ if(Array.isArray(data[k])){ records=data[k]; break; } }
    if(!records.length){
      for(const k in data){ if(Array.isArray(data[k]) && data[k].length){ records=data[k]; break; } }
    }
    st.innerHTML = '<div style="background:var(--success-l);color:var(--success-h);border:1px solid var(--success);border-radius:8px;padding:11px 14px;font-size:12px">IA encontrou '+records.length+' registros. Cadastrando...</div>';

    let added=0, skipped=[];
    const tbl = doctype==='concretagens' ? 'civil_concrete_pours' : 'civil_concrete_elements';
    for(const rec of records){
      const r = {...rec, org_id:_org.id, project_id:_curProject.id};
      // Validacao rigorosa
      if(doctype==='concretagens' && !r.pour_number){skipped.push('sem n_pour');continue;}
      if(doctype==='elementos_estruturais' && !r.tag){skipped.push('sem TAG');continue;}
      // Limpa chaves invalidas
      delete r.id; delete r.created_at;
      const {error} = await sb.from(tbl).insert(r);
      if(error){skipped.push((r.pour_number||r.tag||'?')+': '+error.message);continue;}
      added++;
    }
    st.innerHTML = '<div style="background:var(--success-l);color:var(--success-h);border:1px solid var(--success);border-radius:8px;padding:11px 14px;font-size:12px"><strong>Concluido:</strong> '+added+' cadastrados / '+skipped.length+' descartados.</div>'
      + (skipped.length ? '<div style="margin-top:8px;background:var(--warning-l);border:1px solid var(--warning);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--warning-h);max-height:120px;overflow:auto"><strong>Descartados:</strong><ul style="margin:4px 0 0 16px;padding:0">'+skipped.map(s=>'<li>'+san(s)+'</li>').join('')+'</ul></div>' : '');
    if(added){
      setTimeout(()=>{ document.getElementById('ia-up-ov')?.remove(); if(doctype==='concretagens')renderPours(); else renderElements(); }, 1800);
    }
  } catch(e){ st.innerHTML='<div style="background:var(--danger-l);color:var(--danger-h);border:1px solid var(--danger);border-radius:8px;padding:11px 14px;font-size:12px">Erro: '+(e.message||e)+'</div>'; }
}
